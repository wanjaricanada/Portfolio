<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitant Wanjari - Multidisciplinary Designer</title>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;color:#fff}
#fluid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:block}
.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:2;pointer-events:none;user-select:none}
h1{font-size:4rem;font-weight:900;letter-spacing:2px;color:#fff;text-transform:uppercase;margin-bottom:8px;mix-blend-mode:difference}
.subtitle{font-size:.95rem;font-weight:700;letter-spacing:4px;color:#fff;text-transform:uppercase;mix-blend-mode:difference}
.portfolio-btn{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;padding:16px 38px;background:rgba(20,20,20,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;font-size:1.05rem;font-weight:500;border:1px solid rgba(255,255,255,.08);border-radius:14px;cursor:pointer;z-index:3;transition:all .3s ease;text-decoration:none}
.portfolio-btn:hover{background:rgba(40,40,40,.75);transform:translateX(-50%) translateY(-2px)}
.arrow{display:inline-block;transition:transform .3s ease}
.portfolio-btn:hover .arrow{transform:translateX(4px)}
@media (max-width:768px){h1{font-size:2.2rem}.subtitle{font-size:.75rem;letter-spacing:3px}.portfolio-btn{padding:14px 28px;font-size:.95rem}}
</style>
  </head>
<body>
<canvas id="fluid"></canvas>
  <div class="content">
<h1>NITANT WANJARI</h1>
  <p class="subtitle">Tech  ·  Sales & Marketing  ·  Immersive Media</p>
</div>
  <a href="portfolio.html" class="portfolio-btn">Portfolio <span class="arrow">&rarr;</span></a>
<script src="https://cdn.jsdelivr.net/gh/PavelDoGreat/WebGL-Fluid-Simulation@master/script.js"></script>
  </body>
</html>
